# Fly.io App Configuration
app = "hima-discord-bot"

primary_region = "iad"  # US East (closest to Discord servers)

[build]

# Remove HTTP service since we don't need the dashboard
# [http_service]
#   internal_port = 3000

[experimental]
  auto_rollback = true

[[vm]]
  memory = '512mb'  # Increased for voice processing
  cpu_kind = 'shared'
  cpus = 1

[env]
  NODE_ENV = "production"

# Keep machine always running
[processes]
  app = "node index.js"

[[services]]
  internal_port = 8080
  protocol = "tcp"

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
